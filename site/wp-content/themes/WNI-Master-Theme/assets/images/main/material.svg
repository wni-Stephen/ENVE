<style>
  .material-vibe {
    transform-box: fill-box;
    transform-origin: center;
    animation: material-vibe 0.42s ease-in-out infinite;
  }

  @keyframes material-vibe {
    0% {
      transform: translate(0, 0) rotate(0deg);
    }
    25% {
      transform: translate(0.45px, -0.3px) rotate(-0.18deg);
    }
    50% {
      transform: translate(-0.4px, 0.35px) rotate(0.16deg);
    }
    75% {
      transform: translate(0.35px, 0.25px) rotate(-0.12deg);
    }
    100% {
      transform: translate(0, 0) rotate(0deg);
    }
  }
</style>
